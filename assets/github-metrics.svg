<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub overview metrics</title>
  <desc id="desc">Local metrics card based on the public rencaldas GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
      <stop offset="1" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="110" x2="1080" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#38BDF8" />
      <stop offset="1" stop-color="#A855F7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1200" height="620" rx="24" fill="url(#bg)" />
  <rect x="42" y="42" width="1116" height="536" rx="22" fill="#0B1224" stroke="url(#accent)" stroke-opacity="0.35" />
  <circle cx="1018" cy="160" r="142" fill="#A855F7" opacity="0.12" filter="url(#glow)" />
  <circle cx="214" cy="452" r="164" fill="#22D3EE" opacity="0.12" filter="url(#glow)" />

  <text x="78" y="126" fill="#F8FAFC" font-size="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">GitHub Overview</text>
  <text x="78" y="172" fill="#94A3B8" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif">Public profile summary for @rencaldas</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g>
      <rect x="78" y="228" width="240" height="130" rx="20" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.28" />
      <text x="106" y="272" fill="#94A3B8" font-size="18" font-weight="600">Public repos</text>
      <text x="106" y="320" fill="#F8FAFC" font-size="48" font-weight="800">7</text>
    </g>
    <g>
      <rect x="336" y="228" width="240" height="130" rx="20" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.28" />
      <text x="364" y="272" fill="#94A3B8" font-size="18" font-weight="600">Stars earned</text>
      <text x="364" y="320" fill="#F8FAFC" font-size="48" font-weight="800">12</text>
    </g>
    <g>
      <rect x="594" y="228" width="240" height="130" rx="20" fill="#0F172A" stroke="#A855F7" stroke-opacity="0.28" />
      <text x="622" y="272" fill="#94A3B8" font-size="18" font-weight="600">Followers</text>
      <text x="622" y="320" fill="#F8FAFC" font-size="48" font-weight="800">2</text>
    </g>
    <g>
      <rect x="852" y="228" width="240" height="130" rx="20" fill="#0F172A" stroke="#F2C811" stroke-opacity="0.28" />
      <text x="880" y="272" fill="#94A3B8" font-size="18" font-weight="600">Following</text>
      <text x="880" y="320" fill="#F8FAFC" font-size="48" font-weight="800">3</text>
    </g>
  </g>

  <g font-family="Fira Code, Consolas, monospace">
    <rect x="78" y="412" width="360" height="106" rx="18" fill="#0F172A" stroke="#1F2937" />
    <text x="106" y="446" fill="#5EEAD4" font-size="18" font-weight="700">Profile signal</text>
    <text x="106" y="478" fill="#CBD5E1" font-size="16">Engineering focus, cloud, automation, backend.</text>
    <text x="106" y="506" fill="#CBD5E1" font-size="16">Built for recruiters and technical peers.</text>

    <rect x="462" y="412" width="640" height="106" rx="18" fill="#0F172A" stroke="#1F2937" />
    <text x="490" y="446" fill="#5EEAD4" font-size="18" font-weight="700">Repository mix</text>
    <rect x="490" y="468" width="460" height="14" rx="7" fill="#1F2937" />
    <rect x="490" y="468" width="280" height="14" rx="7" fill="#38BDF8" />
    <rect x="490" y="492" width="460" height="14" rx="7" fill="#1F2937" />
    <rect x="490" y="492" width="180" height="14" rx="7" fill="#A855F7" />
    <rect x="490" y="516" width="460" height="14" rx="7" fill="#1F2937" />
    <rect x="490" y="516" width="180" height="14" rx="7" fill="#22D3EE" />
  </g>
</svg>
