<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Renato Azevedo Caldas profile banner</title>
  <desc id="desc">Dark modern banner with blue, cyan and purple gradients and subtle animated effects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
      <stop offset="0.55" stop-color="#0B1224" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="240" y1="60" x2="1360" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#38BDF8" />
      <stop offset="1" stop-color="#A855F7" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 130) rotate(140) scale(360 260)">
      <stop stop-color="#A855F7" stop-opacity="0.55" />
      <stop offset="1" stop-color="#A855F7" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 410) rotate(-15) scale(420 240)">
      <stop stop-color="#22D3EE" stop-opacity="0.3" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blurred" />
      <feColorMatrix in="blurred" type="matrix" values="1 0 0 0 0.14 0 1 0 0 0.85 0 0 1 0 0.98 0 0 0 0.7 0" />
    </filter>
    <clipPath id="clip">
      <rect width="1600" height="520" rx="36" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1600" height="520" fill="url(#bg)" />
    <rect width="1600" height="520" fill="url(#glow)" filter="url(#blur)">
      <animate attributeName="opacity" values="0.55;0.95;0.55" dur="8s" repeatCount="indefinite" />
    </rect>
    <rect width="1600" height="520" fill="url(#glow2)" filter="url(#blur)">
      <animate attributeName="opacity" values="0.45;0.7;0.45" dur="9s" repeatCount="indefinite" />
    </rect>

    <path d="M-120 390C160 250 360 220 620 260C820 292 980 390 1260 350C1400 330 1500 278 1700 190" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" opacity="0.6" />
    <path d="M-140 430C160 310 420 280 650 316C880 352 1020 436 1320 398C1470 379 1560 336 1700 250" stroke="#22D3EE" stroke-width="1.2" stroke-dasharray="10 12" stroke-linecap="round" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="0" to="120" dur="9s" repeatCount="indefinite" />
    </path>

    <circle cx="1220" cy="120" r="92" fill="#8B5CF6" opacity="0.25" filter="url(#blur)">
      <animate attributeName="r" values="86;106;86" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="370" cy="390" r="118" fill="#22D3EE" opacity="0.17" filter="url(#blur)">
      <animate attributeName="cx" values="350;390;350" dur="11s" repeatCount="indefinite" />
    </circle>

    <g opacity="0.16">
      <path d="M120 66H1480" stroke="#94A3B8" stroke-width="1" />
      <path d="M120 454H1480" stroke="#94A3B8" stroke-width="1" />
      <path d="M120 66V454" stroke="#94A3B8" stroke-width="1" />
      <path d="M1480 66V454" stroke="#94A3B8" stroke-width="1" />
    </g>

    <text x="120" y="212" fill="#F8FAFC" font-size="66" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="0.4">
      Renato Azevedo Caldas
    </text>
    <text x="120" y="268" fill="#B8C3D8" font-size="30" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">
      Systems Analyst  |  Cloud Computing  |  Automation  |  Software Engineering
    </text>
    <text x="120" y="322" fill="#7DD3FC" font-size="22" font-weight="600" font-family="Fira Code, Consolas, monospace">
      Building enterprise software solutions through integration and reliability.
    </text>

    <g opacity="0.9">
      <rect x="120" y="360" width="214" height="58" rx="16" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.32" />
      <text x="156" y="397" fill="#E2E8F0" font-size="21" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">Systems Analyst</text>

      <rect x="350" y="360" width="220" height="58" rx="16" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.32" />
      <text x="392" y="397" fill="#E2E8F0" font-size="21" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">Cloud Computing</text>

      <rect x="586" y="360" width="180" height="58" rx="16" fill="#0F172A" stroke="#A855F7" stroke-opacity="0.32" />
      <text x="625" y="397" fill="#E2E8F0" font-size="21" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">Automation</text>
    </g>
  </g>
</svg>
