<svg width="1020" height="320" viewBox="0 0 1020 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Renato de Azevedo Caldas profile banner</title>
  <desc id="desc">Dark modern banner with blue, cyan and purple gradients, text content adjusted for the left block.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1020" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
      <stop offset="0.55" stop-color="#0B1224" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="240" y1="40" x2="1020" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#38BDF8" />
      <stop offset="1" stop-color="#A855F7" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 80) rotate(140) scale(300 180)">
      <stop stop-color="#A855F7" stop-opacity="0.4" />
      <stop offset="1" stop-color="#A855F7" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 260) rotate(-15) scale(360 160)">
      <stop stop-color="#22D3EE" stop-opacity="0.25" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
    <clipPath id="clip">
      <rect width="1020" height="320" rx="20" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Planos de Fundo com Brilho Dinâmico -->
    <rect width="1020" height="320" fill="url(#bg)" />
    <rect width="1020" height="320" fill="url(#glow)" filter="url(#blur)">
      <animate attributeName="opacity" values="0.55;0.85;0.55" dur="8s" repeatCount="indefinite" />
    </rect>
    <rect width="1020" height="320" fill="url(#glow2)" filter="url(#blur)">
      <animate attributeName="opacity" values="0.45;0.65;0.45" dur="9s" repeatCount="indefinite" />
    </rect>

    <!-- Ondas Abstratas Ajustadas de Fundo -->
    <path d="M-120 240C160 140 360 120 620 150C820 172 980 240 1260 210C1400 195 1500 155 1700 90" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.4" />
    <path d="M-140 270C160 190 420 170 650 196C880 222 1020 276 1320 248C1470 234 1560 200 1700 130" stroke="#22D3EE" stroke-width="1" stroke-dasharray="10 12" stroke-linecap="round" opacity="0.3">
      <animate attributeName="stroke-dashoffset" from="0" to="120" dur="9s" repeatCount="indefinite" />
    </path>

    <!-- Moldura Geométrica Sutil à Esquerda -->
    <g opacity="0.12">
      <path d="M60 35H960" stroke="#94A3B8" stroke-width="1" />
      <path d="M60 285H960" stroke="#94A3B8" stroke-width="1" />
      <path d="M60 35V285" stroke="#94A3B8" stroke-width="1" />
      <path d="M960 35V285" stroke="#94A3B8" stroke-width="1" />
    </g>

    <!-- Elementos de Texto (Alinhados à Esquerda) -->
    <text x="90" y="115" fill="#F8FAFC" font-size="52" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="0.4">
      Renato de Azevedo Caldas
    </text>
    <text x="90" y="165" fill="#B8C3D8" font-size="24" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">
      Systems Analyst  |  Cloud Computing  |  Automation  |  Software Engineering
    </text>
    <text x="90" y="215" fill="#7DD3FC" font-size="18" font-weight="600" font-family="Fira Code, Consolas, monospace">
      Building enterprise software solutions through integration and reliability.
    </text>
  </g>
</svg>
