<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub trophies</title>
  <desc id="desc">Local trophy-style achievements based on the rencaldas GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="80" x2="1080" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#38BDF8" />
      <stop offset="1" stop-color="#A855F7" />
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#bg)" />
  <rect x="42" y="42" width="1116" height="336" rx="22" fill="#0B1224" stroke="url(#accent)" stroke-opacity="0.35" />
  <text x="78" y="118" fill="#F8FAFC" font-size="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">Profile Trophies</text>
  <text x="78" y="160" fill="#94A3B8" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif">Achievements aligned with your real public GitHub presence and portfolio focus.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g>
      <rect x="78" y="206" width="246" height="132" rx="20" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.3" />
      <circle cx="132" cy="272" r="30" fill="#22D3EE" opacity="0.18" />
      <path d="M120 252H144V266C144 280 138 288 132 292C126 288 120 280 120 266V252Z" fill="#22D3EE" />
      <path d="M112 258H104C100 258 96 262 96 266C96 274 102 280 110 282" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" />
      <path d="M152 258H160C164 258 168 262 168 266C168 274 162 280 154 282" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" />
      <text x="182" y="256" fill="#F8FAFC" font-size="20" font-weight="800">Open Source</text>
      <text x="182" y="286" fill="#CBD5E1" font-size="16">Public repos and visible work</text>
    </g>

    <g>
      <rect x="476" y="206" width="246" height="132" rx="20" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.3" />
      <circle cx="530" cy="272" r="30" fill="#38BDF8" opacity="0.18" />
      <rect x="520" y="244" width="20" height="40" rx="8" fill="#38BDF8" />
      <rect x="514" y="284" width="32" height="10" rx="5" fill="#38BDF8" />
      <path d="M520 246L530 234L540 246" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="580" y="256" fill="#F8FAFC" font-size="20" font-weight="800">Cloud Builder</text>
      <text x="580" y="286" fill="#CBD5E1" font-size="16">AWS, cloud labs, and architecture</text>
    </g>

    <g>
      <rect x="874" y="206" width="246" height="132" rx="20" fill="#0F172A" stroke="#A855F7" stroke-opacity="0.3" />
      <circle cx="928" cy="272" r="30" fill="#A855F7" opacity="0.18" />
      <rect x="914" y="246" width="28" height="36" rx="8" fill="#A855F7" />
      <path d="M914 252H942" stroke="#A855F7" stroke-width="4" stroke-linecap="round" />
      <path d="M922 242L928 232L934 242" stroke="#A855F7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="978" y="256" fill="#F8FAFC" font-size="20" font-weight="800">Automation</text>
      <text x="978" y="286" fill="#CBD5E1" font-size="16">n8n, APIs, and integrations</text>
    </g>
  </g>

  <text x="78" y="382" fill="#94A3B8" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">These cards are local SVGs, so they do not depend on external services.</text>
</svg>
