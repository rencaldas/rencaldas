<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Activity streak</title>
  <desc id="desc">Local activity streak card for the rencaldas GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="64" x2="1080" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#38BDF8" />
      <stop offset="1" stop-color="#A855F7" />
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)" />
  <rect x="42" y="42" width="1116" height="236" rx="22" fill="#0B1224" stroke="url(#accent)" stroke-opacity="0.35" />

  <text x="78" y="112" fill="#F8FAFC" font-size="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">Activity Rhythm</text>
  <text x="78" y="154" fill="#94A3B8" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif">Steady public activity across cloud, automation, and backend projects.</text>

  <g transform="translate(80 186)">
    <rect x="0" y="34" width="1040" height="18" rx="9" fill="#1F2937" />
    <rect x="0" y="34" width="180" height="18" rx="9" fill="#22D3EE" />
    <rect x="208" y="18" width="64" height="52" rx="14" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.35" />
    <rect x="296" y="8" width="64" height="62" rx="14" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.35" />
    <rect x="384" y="22" width="64" height="48" rx="14" fill="#0F172A" stroke="#A855F7" stroke-opacity="0.35" />
    <rect x="472" y="0" width="64" height="70" rx="14" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.35" />
    <rect x="560" y="14" width="64" height="56" rx="14" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.35" />
    <rect x="648" y="6" width="64" height="64" rx="14" fill="#0F172A" stroke="#A855F7" stroke-opacity="0.35" />
    <rect x="736" y="24" width="64" height="46" rx="14" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.35" />
    <rect x="824" y="12" width="64" height="58" rx="14" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.35" />
    <rect x="912" y="20" width="64" height="50" rx="14" fill="#0F172A" stroke="#A855F7" stroke-opacity="0.35" />
  </g>
